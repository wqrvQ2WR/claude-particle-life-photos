<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Particle Life · 도트/사진 통합</title>
<style>
  :root {
    --bg: #0a0710;
    --panel: rgba(18, 16, 26, 0.74);
    --border: rgba(255, 255, 255, 0.08);
    --text: #f1ecff;
    --muted: #9c93b8;
    --accent: #ff9ecb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: radial-gradient(circle at 50% 30%, #1a1228, #07050c 70%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }
  canvas { display: block; position: fixed; inset: 0; cursor: crosshair; }

  #loading {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: var(--bg); z-index: 100; transition: opacity 0.4s;
  }
  #loading .ring {
    width: 38px; height: 38px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.15); border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--muted); font-size: 13px; }
  #loading.done { opacity: 0; pointer-events: none; }

  #ui {
    position: fixed; top: 16px; left: 16px; width: 280px;
    background: var(--panel);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55);
    transition: transform 0.35s cubic-bezier(.2,.8,.2,1), opacity 0.35s;
    z-index: 10;
    max-height: calc(100vh - 32px);
    overflow-y: auto;
  }
  #ui.hidden { transform: translateX(-320px); opacity: 0; pointer-events: none; }

  h1 { font-size: 15px; font-weight: 700; letter-spacing: 0.3px; display: flex; align-items: center; gap: 8px; }
  h1 .dot {
    width: 9px; height: 9px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 10px var(--accent); animation: pulse 2s infinite;
  }
  @keyframes pulse { 50% { opacity: 0.4; } }
  .sub { font-size: 11px; color: var(--muted); margin: 4px 0 16px; line-height: 1.5; }

  .seg {
    display: flex; background: rgba(255,255,255,0.06); border-radius: 10px;
    padding: 3px; margin-bottom: 16px; gap: 3px;
  }
  .seg button {
    flex: 1; padding: 8px 0; border-radius: 8px; border: none;
    background: transparent; color: var(--muted); font-size: 12px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
  }
  .seg button.active { background: var(--accent); color: #2a0d1c; }

  .row { margin-bottom: 14px; }
  .row label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .row label span { color: var(--accent); font-variant-numeric: tabular-nums; }

  input[type=range] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 4px;
    border-radius: 4px; background: rgba(255,255,255,0.12); outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 16px; height: 16px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
    box-shadow: 0 0 10px rgba(255,158,203,0.6); transition: transform 0.1s;
  }
  input[type=range]::-webkit-slider-thumb:active { transform: scale(1.25); }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  .btns { display: flex; gap: 8px; margin-top: 6px; }
  button {
    flex: 1; padding: 10px 0; border-radius: 10px; border: 1px solid var(--border);
    background: rgba(255,255,255,0.05); color: var(--text); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  button:hover { background: rgba(255,158,203,0.14); border-color: var(--accent); }
  button:active { transform: scale(0.96); }
  button.primary { background: var(--accent); color: #2a0d1c; border-color: var(--accent); }
  button.primary:hover { filter: brightness(1.08); }

  #uploadStatus { font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.4; min-height: 14px; }
  #uploadStatus b { color: var(--accent); }

  .hint {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: var(--muted); background: var(--panel); border: 1px solid var(--border);
    padding: 8px 16px; border-radius: 99px; backdrop-filter: blur(12px); z-index: 5; white-space: nowrap;
  }
  .hint b { color: var(--text); }

  #toggle {
    position: fixed; top: 16px; left: 16px; z-index: 11; width: 40px; height: 40px;
    border-radius: 12px; display: none; align-items: center; justify-content: center; font-size: 18px;
  }
  #toggle.show { display: flex; }

  #power {
    position: fixed; top: 16px; right: 16px; z-index: 11;
    display: flex; align-items: center; gap: 8px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 99px; padding: 8px 14px 8px 10px;
    backdrop-filter: blur(14px); cursor: pointer; user-select: none;
  }
  #power .label { font-size: 11px; font-weight: 600; color: var(--muted); }
  #power .track {
    width: 38px; height: 20px; border-radius: 99px;
    background: rgba(255,255,255,0.15); position: relative;
    transition: background 0.2s;
  }
  #power .thumb {
    position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
    border-radius: 50%; background: #fff; transition: left 0.2s, background 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  #power.on .track { background: var(--accent); }
  #power.on .thumb { left: 20px; }
  #power.on .label { color: var(--text); }
</style>
</head>
<body>
<div id="loading"><div class="ring"></div><p>기본 이미지 불러오는 중…</p></div>

<canvas id="c"></canvas>
<button id="toggle">☰</button>
<div id="power" class="on"><span class="label">ON</span><span class="track"><span class="thumb"></span></span></div>

<div id="ui">
  <h1><span class="dot"></span> Particle Life</h1>
  <p class="sub">같은 그룹끼리는 끌어당기고 다른 그룹은 밀어내며 떠다니는 입자 생태계. 도트와 사진 모드를 자유롭게 전환하세요.</p>

  <div class="seg">
    <button id="modeDot" class="active">⬤ 도트</button>
    <button id="modePhoto">🖼 사진</button>
  </div>

  <div class="row">
    <label>입자 수 <span id="vCount">260</span></label>
    <input id="count" type="range" min="60" max="800" step="10" value="260">
  </div>
  <div class="row">
    <label>입자 크기 <span id="vSize">42</span></label>
    <input id="size" type="range" min="10" max="80" step="2" value="42">
  </div>
  <div class="row">
    <label>상호작용 거리 <span id="vRange">110</span></label>
    <input id="range" type="range" min="50" max="220" step="5" value="110">
  </div>
  <div class="row">
    <label>힘의 세기 <span id="vForce">1.0</span></label>
    <input id="force" type="range" min="0.1" max="3" step="0.1" value="1.0">
  </div>
  <div class="row">
    <label>마찰(점성) <span id="vFric">0.86</span></label>
    <input id="fric" type="range" min="0.5" max="0.98" step="0.01" value="0.86">
  </div>

  <div class="btns">
    <button id="shuffle" class="primary">새 규칙 ⟳</button>
    <button id="reset">재배치</button>
  </div>
  <div class="btns" style="margin-top:8px">
    <button id="pause">일시정지</button>
    <button id="hideUi">패널 숨기기</button>
  </div>

  <div class="divider"></div>

  <div class="btns">
    <button id="uploadBtn" class="primary">📤 이미지 업로드</button>
    <button id="resetImages">기본 이미지</button>
  </div>
  <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
  <div id="uploadStatus"></div>
</div>

<div class="hint">🖱️ <b>드래그</b>로 휘젓기 · <b>클릭</b>으로 폭발 · <b>스페이스</b> 일시정지 · <b>S</b> 새 규칙</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ── Defaults ────────────────────────────────────────────
const DEFAULT_FILES = [1, 3, 6, 8, 11, 13, 16, 18, 21, 23, 26, 28, 31, 33, 36, 38, 41, 43]
  .map(n => `assets/sticker_${String(n).padStart(2, '0')}.png`);

const TYPE_COLORS = ['#ff5d73', '#6ee7ff', '#ffd166', '#a78bfa', '#4ade80', '#ff9ecb'];
const NTYPES = TYPE_COLORS.length;

let defaultBuckets = Array.from({ length: NTYPES }, () => []);
let buckets = Array.from({ length: NTYPES }, () => []);
let nextBucket = 0;

function loadImage(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

function loadDefaults() {
  return Promise.all(DEFAULT_FILES.map(loadImage)).then(imgs => {
    imgs.forEach((img, i) => {
      if (!img) return;
      defaultBuckets[i % NTYPES].push(img);
    });
    resetToDefaultImages();
  });
}

function resetToDefaultImages() {
  buckets = defaultBuckets.map(b => b.slice());
  nextBucket = 0;
}

function addUploadedImages(files) {
  const list = Array.from(files).filter(f => f.type.startsWith('image/'));
  if (!list.length) return;
  Promise.all(list.map(f => loadImage(URL.createObjectURL(f)))).then(imgs => {
    const valid = imgs.filter(Boolean);
    if (!valid.length) {
      document.getElementById('uploadStatus').textContent = '이미지를 불러오지 못했어요.';
      return;
    }
    buckets = Array.from({ length: NTYPES }, () => []);
    nextBucket = 0;
    valid.forEach(img => {
      buckets[nextBucket % NTYPES].push(img);
      nextBucket++;
    });
    document.getElementById('uploadStatus').innerHTML =
      `<b>${valid.length}개</b> 이미지로 교체됐어요.`;
    init();
  });
}

function pickImageFor(type) {
  let bucket = buckets[type];
  if (!bucket.length) bucket = buckets.find(b => b.length);
  if (!bucket || !bucket.length) return null;
  return bucket[(Math.random() * bucket.length) | 0];
}

function fitBox(img, target) {
  if (!img || !img.naturalWidth) return { w: target * 0.65, h: target };
  const ar = img.naturalWidth / img.naturalHeight;
  if (ar >= 1) return { w: target, h: target / ar };
  return { w: target * ar, h: target };
}

// ── State ───────────────────────────────────────────────
let mode = 'dot'; // 'dot' | 'photo'
let params = { count: 260, size: 42, range: 110, force: 1.0, fric: 0.86 };
let attraction = [];
let px, py, vx, vy, pt, pimg, prot;
let paused = false;

function randomRules() {
  attraction = [];
  for (let i = 0; i < NTYPES; i++) {
    attraction[i] = [];
    for (let j = 0; j < NTYPES; j++) attraction[i][j] = Math.random() * 2 - 1;
  }
}

function init() {
  const n = params.count;
  px = new Float32Array(n); py = new Float32Array(n);
  vx = new Float32Array(n); vy = new Float32Array(n);
  pt = new Uint8Array(n); prot = new Float32Array(n);
  pimg = new Array(n);
  for (let i = 0; i < n; i++) {
    px[i] = Math.random() * W;
    py[i] = Math.random() * H;
    vx[i] = 0; vy[i] = 0;
    const t = (Math.random() * NTYPES) | 0;
    pt[i] = t;
    pimg[i] = pickImageFor(t);
    prot[i] = 0;
  }
}

randomRules();

// ── Spatial grid ─────────────────────────────────────────
let grid = new Map();
function buildGrid(cell) {
  grid.clear();
  const n = px.length;
  for (let i = 0; i < n; i++) {
    const gx = (px[i] / cell) | 0;
    const gy = (py[i] / cell) | 0;
    const key = gx * 73856093 ^ gy * 19349663;
    let arr = grid.get(key);
    if (!arr) { arr = []; grid.set(key, arr); }
    arr.push(i);
  }
}

// ── Mouse ────────────────────────────────────────────────
let mouse = { x: -9999, y: -9999, down: false, pressForce: 0 };
canvas.addEventListener('pointermove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('pointerdown', e => {
  mouse.x = e.clientX; mouse.y = e.clientY; mouse.down = true; mouse.pressForce = -6;
});
canvas.addEventListener('pointerup', () => { mouse.down = false; });
canvas.addEventListener('pointerleave', () => { mouse.x = mouse.y = -9999; mouse.down = false; });

// ── Physics ──────────────────────────────────────────────
function step() {
  const n = px.length;
  const R = params.range, R2 = R * R, F = params.force, fric = params.fric, cell = R;
  buildGrid(cell);

  for (let i = 0; i < n; i++) {
    let fx = 0, fy = 0;
    const xi = px[i], yi = py[i], ti = pt[i];
    const gx = (xi / cell) | 0, gy = (yi / cell) | 0;

    for (let ox = -1; ox <= 1; ox++) {
      for (let oy = -1; oy <= 1; oy++) {
        const key = (gx + ox) * 73856093 ^ (gy + oy) * 19349663;
        const arr = grid.get(key);
        if (!arr) continue;
        for (let k = 0; k < arr.length; k++) {
          const j = arr[k];
          if (j === i) continue;
          const dx = px[j] - xi, dy = py[j] - yi;
          const d2 = dx * dx + dy * dy;
          if (d2 > R2 || d2 === 0) continue;
          const d = Math.sqrt(d2);
          const ratio = d / R;
          let f;
          if (ratio < 0.35) {
            f = (ratio / 0.35 - 1);
          } else {
            const a = attraction[ti][pt[j]];
            f = a * (1 - Math.abs(2 * ratio - 1.3));
          }
          fx += (dx / d) * f;
          fy += (dy / d) * f;
        }
      }
    }

    const mdx = mouse.x - xi, mdy = mouse.y - yi;
    const md2 = mdx * mdx + mdy * mdy;
    const MR = 160;
    if (md2 < MR * MR && md2 > 1) {
      const md = Math.sqrt(md2);
      const strength = mouse.down ? mouse.pressForce : 2.2;
      const g = (1 - md / MR) * strength;
      fx += (mdx / md) * g;
      fy += (mdy / md) * g;
    }

    vx[i] = (vx[i] + fx * F * 0.5) * fric;
    vy[i] = (vy[i] + fy * F * 0.5) * fric;
  }

  if (mouse.pressForce < 0) mouse.pressForce = Math.min(0, mouse.pressForce + 0.4);

  for (let i = 0; i < n; i++) {
    px[i] += vx[i];
    py[i] += vy[i];
    if (px[i] < 0) px[i] += W; else if (px[i] >= W) px[i] -= W;
    if (py[i] < 0) py[i] += H; else if (py[i] >= H) py[i] -= H;
    const targetRot = Math.max(-0.35, Math.min(0.35, vx[i] * 0.05));
    prot[i] += (targetRot - prot[i]) * 0.1;
  }
}

// ── Render ───────────────────────────────────────────────
function render() {
  ctx.fillStyle = mode === 'dot' ? 'rgba(5, 6, 10, 0.22)' : 'rgba(7, 5, 12, 0.30)';
  ctx.fillRect(0, 0, W, H);

  const n = px.length;

  if (mode === 'dot') {
    const r = Math.max(1.2, params.size / 18);
    ctx.globalCompositeOperation = 'lighter';
    for (let t = 0; t < NTYPES; t++) {
      ctx.fillStyle = TYPE_COLORS[t];
      ctx.beginPath();
      for (let i = 0; i < n; i++) {
        if (pt[i] !== t) continue;
        ctx.moveTo(px[i] + r, py[i]);
        ctx.arc(px[i], py[i], r, 0, 6.2832);
      }
      ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';
  } else {
    for (let i = 0; i < n; i++) {
      const img = pimg[i];
      const box = fitBox(img, params.size);
      ctx.save();
      ctx.translate(px[i], py[i]);
      ctx.rotate(prot[i]);
      ctx.shadowColor = TYPE_COLORS[pt[i]];
      ctx.shadowBlur = 9;
      if (img) {
        ctx.drawImage(img, -box.w / 2, -box.h / 2, box.w, box.h);
      } else {
        ctx.fillStyle = TYPE_COLORS[pt[i]];
        ctx.shadowBlur = 0;
        ctx.beginPath(); ctx.arc(0, 0, box.h / 3, 0, 6.2832); ctx.fill();
      }
      ctx.restore();
    }
  }
}

function loop() {
  if (!paused) step();
  render();
  requestAnimationFrame(loop);
}

// ── UI wiring ─────────────────────────────────────────────
function bind(id, key, fmt, onCommit) {
  const el = document.getElementById(id);
  const out = document.getElementById('v' + id.charAt(0).toUpperCase() + id.slice(1));
  const upd = () => {
    const v = parseFloat(el.value);
    params[key] = v;
    if (out) out.textContent = fmt ? fmt(v) : v;
    if (onCommit) onCommit(v);
  };
  el.addEventListener('input', upd);
  upd();
}
bind('count', 'count', v => v, () => init());
bind('size', 'size', v => v);
bind('range', 'range', v => v);
bind('force', 'force', v => v.toFixed(1));
bind('fric', 'fric', v => v.toFixed(2));

document.getElementById('shuffle').onclick = () => randomRules();
document.getElementById('reset').onclick = () => init();

const modeDotBtn = document.getElementById('modeDot');
const modePhotoBtn = document.getElementById('modePhoto');
function setMode(m) {
  mode = m;
  modeDotBtn.classList.toggle('active', m === 'dot');
  modePhotoBtn.classList.toggle('active', m === 'photo');
}
modeDotBtn.onclick = () => setMode('dot');
modePhotoBtn.onclick = () => setMode('photo');

const power = document.getElementById('power');
const powerLabel = power.querySelector('.label');
const pauseBtn = document.getElementById('pause');
function setPower(on) {
  paused = !on;
  power.classList.toggle('on', on);
  powerLabel.textContent = on ? 'ON' : 'OFF';
  pauseBtn.textContent = on ? '일시정지' : '재생';
}
power.onclick = () => setPower(paused);
pauseBtn.onclick = () => setPower(paused);

const ui = document.getElementById('ui');
const toggle = document.getElementById('toggle');
document.getElementById('hideUi').onclick = () => { ui.classList.add('hidden'); toggle.classList.add('show'); };
toggle.onclick = () => { ui.classList.remove('hidden'); toggle.classList.remove('show'); };

const fileInput = document.getElementById('fileInput');
document.getElementById('uploadBtn').onclick = () => fileInput.click();
fileInput.addEventListener('change', e => {
  addUploadedImages(e.target.files);
  fileInput.value = '';
});
document.getElementById('resetImages').onclick = () => {
  resetToDefaultImages();
  document.getElementById('uploadStatus').textContent = '기본 포토카드로 초기화했어요.';
  init();
};

window.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); pauseBtn.click(); }
  if (e.key === 's' || e.key === 'S') randomRules();
  if (e.key === 'r' || e.key === 'R') init();
});

// drag & drop upload anywhere on canvas
canvas.addEventListener('dragover', e => e.preventDefault());
canvas.addEventListener('drop', e => {
  e.preventDefault();
  if (e.dataTransfer.files.length) addUploadedImages(e.dataTransfer.files);
});

loadDefaults().then(() => {
  init();
  document.getElementById('loading').classList.add('done');
  loop();
});
</script>
</body>
</html>
